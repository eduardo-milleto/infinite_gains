version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app_net
      - analyst_net

  migrate:
    build: .
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "-c", "alembic/alembic.ini", "upgrade", "head"]
    networks:
      - app_net

  trader:
    build: .
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["python", "-m", "src.services.trader.__main__"]
    ports:
      - "8080:8080"
    networks:
      - app_net

  web_api:
    build: .
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["python", "-m", "src.services.web.__main__"]
    ports:
      - "8081:8081"
    networks:
      - app_net

  frontend:
    build:
      context: ./frontend
    depends_on:
      web_api:
        condition: service_started
    environment:
      VITE_API_PROXY_TARGET: http://web_api:8081
    ports:
      - "5173:5173"
    networks:
      - app_net

  telegram_bot:
    build: .
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["python", "-m", "src.services.telegram.__main__"]
    networks:
      - app_net

  learning:
    build: .
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["python", "-m", "src.services.learning.__main__"]
    networks:
      - app_net

  openclaw:
    build: .
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+asyncpg://analyst_ro:${ANALYST_RO_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY}
      MINIMAX_MODEL: ${MINIMAX_MODEL}
      OPENCLAW_ENABLED: ${OPENCLAW_ENABLED}
      OPENCLAW_SCHEDULE_HOURS: ${OPENCLAW_SCHEDULE_HOURS}
      OPENCLAW_MIN_TRADES_FOR_ANALYSIS: ${OPENCLAW_MIN_TRADES_FOR_ANALYSIS}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_ALLOWED_CHAT_IDS: ${TELEGRAM_ALLOWED_CHAT_IDS}
    command: ["python", "-m", "src.services.openclaw.__main__"]
    networks:
      - analyst_net

volumes:
  postgres_data:

networks:
  app_net:
  analyst_net:
