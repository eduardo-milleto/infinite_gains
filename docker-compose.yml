version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "-c", "alembic/alembic.ini", "upgrade", "head"]

  trader:
    build: .
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["python", "-m", "src.services.trader.__main__"]
    ports:
      - "8080:8080"

  telegram_bot:
    build: .
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["python", "-m", "src.services.telegram.__main__"]

  learning:
    build: .
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["python", "-m", "src.services.learning.__main__"]

volumes:
  postgres_data:
